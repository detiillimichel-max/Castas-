<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#060608">
<title>CASTAS • Mensagens</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{--bg:#060608;--sur:#0f0f14;--sur2:#1c1c24;--bd:rgba(255,255,255,.10);--tx:#e8e8f0;--mu:#8a8a9a;--ac:#00e5ff;--top:56px;--bot:64px}
@media(prefers-color-scheme:light){:root{--bg:#fff;--sur:#fff;--sur2:#f1f3f4;--bd:rgba(0,0,0,.10);--tx:#202124;--mu:#5f6368}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
.tela{position:fixed;inset:0;display:none;flex-direction:column}.ativa{display:flex}
.topo{height:var(--top);display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:1px solid var(--bd);background:color-mix(in srgb,var(--bg) 92%, transparent)}
.busca{margin:10px 12px;display:flex;gap:8px;align-items:center;background:var(--sur2);border:1px solid var(--bd);border-radius:24px;padding:9px 14px}
.busca input{flex:1;background:transparent;border:0;outline:0;color:var(--tx);font-size:.9rem}
.lista{flex:1;overflow:auto}
.item{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid color-mix(in srgb,var(--bd) 60%, transparent)}
.item:active{background:var(--sur2)}
.av{width:48px;height:48px;border-radius:50%;background:var(--sur2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.meta{margin-left:auto;font-size:.65rem;color:var(--mu)}
.msgs{flex:1;overflow:auto;padding:10px 10px 6px;display:flex;flex-direction:column;gap:4px}
.bubble{max-width:82%;padding:9px 12px;border-radius:18px;font-size:.92rem;line-height:1.35;word-wrap:break-word}
.minha{align-self:flex-end;background:var(--ac);color:#000;border-bottom-right-radius:6px}
.deles{align-self:flex-start;background:var(--sur2);border:1px solid var(--bd);border-bottom-left-radius:6px}
.bar{display:flex;gap:8px;align-items:flex-end;padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--bd);background:var(--sur)}
.bar textarea{flex:1;resize:none;max-height:110px;min-height:40px;background:var(--sur2);border:1px solid var(--bd);border-radius:20px;padding:10px 14px;outline:0;color:var(--tx);font-family:inherit}
.send{width:40px;height:40px;border-radius:50%;border:0;background:var(--ac);color:#000;font-weight:800}
.nav{height:var(--bot);display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom)}
.nav a{font-size:.7rem;color:var(--mu);text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px}.nav a.ativo{color:var(--ac)}
.fab{position:fixed;right:14px;bottom:calc(var(--bot) + 12px);width:48px;height:48px;border-radius:50%;border:0;background:var(--ac);color:#000;font-size:1.2rem}
</style>
</head>
<body>
<div id="tela-lista" class="tela ativa">
  <div class="topo"><b style="letter-spacing:3px">CASTAS</b><div style="margin-left:auto;display:flex;gap:8px"><button onclick="location.href='./index.html'" style="background:var(--sur2);border:1px solid var(--bd);border-radius:20px;padding:6px 10px;color:var(--tx)">Trocar</button></div></div>
  <div class="busca"><span>🔍</span><input id="q" placeholder="Buscar..." oninput="render()"></div>
  <div id="lista" class="lista"></div>
  <button class="fab" onclick="nova()">✎</button>
</div>
<div id="tela-conv" class="tela">
  <div class="topo"><button onclick="voltar()" style="background:none;border:0;color:var(--ac);font-size:1.2rem">←</button><div id="cav" class="av" style="width:34px;height:34px"></div><div style="flex:1;min-width:0"><div id="cnome" style="font-weight:700"></div><div style="font-size:.65rem;color:var(--ac)">online</div></div></div>
  <div id="msgs" class="msgs"></div>
  <div class="bar"><textarea id="inp" rows="1" placeholder="Mensagem..." oninput="auto(this)"></textarea><button class="send" onclick="enviar()">↑</button></div>
</div>
<nav class="nav">
  <a class="ativo" href="./chat.html">💬<span>Msgs</span></a><a href="./social.html">👥<span>Social</span></a><a href="./stories.html">▶<span>Stories</span></a><a href="./videos.html">🎞<span>Vídeos</span></a><a href="./marketplace.html">🛒<span>Loja</span></a>
</nav>
<script type="module">
import {createClient} from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SB_URL="https://uqdwtzlkqaosnweyoyit.supabase.co";
const SB_KEY="sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA";
const sb=createClient(SB_URL,SB_KEY);
const EU={id:localStorage.getItem("castas_id")||localStorage.getItem("cartas_id")||"",nome:localStorage.getItem("castas_nome")||localStorage.getItem("cartas_nome")||""};
if(!EU.id)location.href="./index.html";
let membros=JSON.parse(localStorage.getItem("castas_membros")||localStorage.getItem("cartas_membros")||"[]");
if(!membros.length)membros=[{id:"michel",nome:"Michel"},{id:"gabriela",nome:"Gabriela"}];
function chave(a,b){return[a,b].sort().join("__")}
let conv=null,msgs=[],ch=null;
const $=s=>document.getElementById(s);
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")}
window.render=()=>{
 const q=($("q").value||"").toLowerCase();
 const el=$("lista");el.innerHTML="";
 const outros=membros.filter(m=>m.id!==EU.id&&(!q||m.nome.toLowerCase().includes(q)));
 if(!outros.length){el.innerHTML="<div style='padding:30px;text-align:center;color:var(--mu)'>Nenhum contato</div>";return}
 outros.forEach(m=>{
  const d=document.createElement("div");d.className="item";d.onclick=()=>abrir({id:chave(EU.id,m.id),nome:m.nome,pid:m.id});
  d.innerHTML=`<div class="av">${esc(m.nome[0])}</div><div style="flex:1"><div style="font-weight:700">${esc(m.nome)}</div><div style="font-size:.75rem;color:var(--mu)">Toque para conversar</div></div>`;
  el.appendChild(d);
 });
};
window.abrir=async c=>{
 conv=c;msgs=[];$("tela-lista").classList.remove("ativa");$("tela-conv").classList.add("ativa");$("cnome").textContent=c.nome;$("cav").textContent=c.nome[0];$("msgs").innerHTML="";
 const {data}=await sb.from("direct_messages").select("*").eq("conversation_key",c.id).order("created_at",{ascending:true}).limit(60);
 msgs=data||[];msgs.forEach(add);scroll();
 if(ch)sb.removeChannel(ch);
 ch=sb.channel("c_"+c.id).on("postgres_changes",{event:"INSERT",schema:"public",table:"direct_messages",filter:`conversation_key=eq.${c.id}`},p=>{msgs.push(p.new);add(p.new);scroll()}).subscribe();
};
window.voltar=()=>{if(ch)sb.removeChannel(ch);$("tela-conv").classList.remove("ativa");$("tela-lista").classList.add("ativa");render()};
function add(m){const d=document.createElement("div");const minha=m.sender_id===EU.id;d.className="bubble "+(minha?"minha":"deles");d.textContent=m.content||"";$("msgs").appendChild(d)}
function scroll(){const e=$("msgs");e.scrollTop=e.scrollHeight}
window.auto=e=>{e.style.height="auto";e.style.height=Math.min(e.scrollHeight,110)+"px"}
window.enviar=async()=>{
 const t=$("inp").value.trim();if(!t||!conv)return;$("inp").value="";$("inp").style.height="40px";
 await sb.from("direct_messages").insert({sender_id:EU.id,recipient_id:conv.pid,conversation_key:conv.id,content:t,type:"text"});
};
window.nova=()=>{const o=membros.filter(m=>m.id!==EU.id);if(!o.length)return;const m=o[0];abrir({id:chave(EU.id,m.id),nome:m.nome,pid:m.id})};
render();
</script>
</body>
</html>
