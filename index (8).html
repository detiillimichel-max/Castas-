<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#060608">
<title>CASTAS</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{--bg:#060608;--sur:#121214;--sur2:#1c1c20;--bd:rgba(255,255,255,.10);--tx:#e8e8f0;--mu:#8a8a9a;--ac:#00e5ff;--ac2:#00a8bf;--gold:#c8a96e;--r:16px}
@media(prefers-color-scheme:light){:root{--bg:#fff;--sur:#f8f9fa;--sur2:#f1f3f4;--bd:rgba(0,0,0,.10);--tx:#202124;--mu:#5f6368}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:400px;padding:28px 20px;display:flex;flex-direction:column;gap:18px}
.logo{font-weight:800;letter-spacing:6px;font-size:2rem;text-align:center;background:linear-gradient(90deg,var(--gold),#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.7rem;letter-spacing:3px;color:var(--mu);text-align:center;text-transform:uppercase}
.list{display:flex;flex-direction:column;gap:10px}
.item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer}
.item.sel{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 8%, var(--sur))}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;background:var(--sur2);border:1px solid var(--bd);flex-shrink:0}
.info{flex:1;min-width:0}.nome{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tag{font-size:.65rem;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.btn{width:100%;padding:15px;border-radius:var(--r);border:0;font-weight:800;letter-spacing:2px;cursor:pointer}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e8d5a0);color:#000}
.btn-ghost{background:var(--sur);border:1px dashed var(--bd);color:var(--ac)}
.btn:disabled{opacity:.4}
#_t{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:8px;width:90%;pointer-events:none}
</style>
</head>
<body>
<div class="wrap">
  <div style="height:32px"></div>
  <div class="logo">CASTAS</div>
  <div class="sub">Mensagens • Família • Social</div>
  <div style="font-size:.75rem;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-top:8px">Quem é você?</div>
  <div id="lista" class="list"></div>
  <button class="btn btn-ghost" onclick="novo()">＋ Adicionar membro</button>
  <button id="btnE" class="btn btn-gold" disabled onclick="entrar()">ENTRAR</button>
</div>
<script>
const def=[{id:"michel",nome:"Michel",tag:"Admin"},{id:"gabriela",nome:"Gabriela",tag:"Família"}];
let membros=JSON.parse(localStorage.getItem("castas_membros")||"null")||def;
let sel=null;
let EU={id:localStorage.getItem("castas_id")||"",nome:localStorage.getItem("castas_nome")||""};
function saveM(){localStorage.setItem("castas_membros",JSON.stringify(membros))}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function render(){
 const el=document.getElementById("lista");el.innerHTML="";
 membros.forEach(m=>{
  const d=document.createElement("div");d.className="item"+(sel&&sel.id===m.id?" sel":"");
  d.onclick=()=>{sel=m;document.getElementById("btnE").disabled=false;render()};
  d.innerHTML=`<div class="av">${esc(m.nome[0].toUpperCase())}</div><div class="info"><div class="nome">${esc(m.nome)}</div><div class="tag">${esc(m.tag||"Membro")}</div></div><div style="color:var(--ac);display:${sel&&sel.id===m.id?"block":"none"}">✓</div>`;
  el.appendChild(d);
 });
}
function toast(m){let c=document.getElementById("_t");if(!c){c=document.createElement("div");c.id="_t";document.body.appendChild(c)}const t=document.createElement("div");t.style.cssText="background:color-mix(in srgb,var(--ac) 12%, #000);border:1px solid var(--bd);padding:10px 14px;border-radius:12px;font-size:.82rem;text-align:center";t.textContent=m;c.appendChild(t);setTimeout(()=>t.remove(),2500)}
function entrar(){if(!sel)return;localStorage.setItem("castas_id",sel.id);localStorage.setItem("castas_nome",sel.nome);location.href="./chat.html"}
function novo(){const n=prompt("Nome do membro:");if(!n||!n.trim())return;const nome=n.trim().slice(0,20);if(membros.find(x=>x.nome.toLowerCase()===nome.toLowerCase())){toast("Já existe");return}const id=nome.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();membros.push({id,nome,tag:"Membro"});saveM();render();toast(nome+" adicionado")}
if(EU.id){const m=membros.find(x=>x.id===EU.id);if(m){sel=m;document.getElementById("btnE").disabled=false}}
render();
if('serviceWorker' in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</body>
</html>
